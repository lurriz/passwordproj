<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PassMaker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <h1 class="header">Generate Password</h1>

    <div class="button-group">
        <button class="btn" id="generate">Generate</button>
        <button class="btn" id="copy-clipboard">Copy</button>
        <button class="btn" id="save-to-DB">Save to DB</button>
        
    </div>
    <input type="number" id="length" placeholder="Length (default 16)">
    

    <div class="box" id="output"></div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const button = document.getElementById("generate");
            const copyBtn = document.getElementById("copy-clipboard");
            const output = document.getElementById("output");
            const lengthInput = document.getElementById("length");

            button.addEventListener("click", async () => {
                const length = lengthInput.value || 16;

                const response = await fetch(`/generate?length=${length}`);
                const password = await response.text();

                output.textContent = password;
            });
            copyBtn.addEventListener("click", () => {
                navigator.clipboard.writeText(output.textContent);

                const msg = document.createElement("div");
                msg.textContent = "Copied!";
                msg.style.position = "absolute";
                msg.style.top = "140px";
                msg.style.color = "white";

                document.body.appendChild(msg);

                setTimeout(() => {
                    msg.remove();
                }, 1000);
            }); 
        });
    </script>
</body>
</html>
