<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
     <h1 class="header" id="vault-head">Password Vault</h1>

    <nav class="sidebar">
        <a href="/">Home</a>
        <a href="/vault">Overview</a>
    </nav>

    <div class="button-group">
        <button class="btn" id="generate">Generate</button>
        <button class="btn" id="copy-clipboard">Copy</button>
        <button class="btn" id="save-to-DB">Save to DB</button>
        
    </div>
    
    <div class="input-group">
        <input class="input" type="number" id="length" placeholder="Length (default 16)">
        <input class="input" type="text" id="site" placeholder="site">
        <input class="input" type="text" id="username" placeholder="username">      
    </div>

</body>
</html>
